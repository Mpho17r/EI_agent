name: CI Pipeline

on:
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install
        run: npm install || echo "skip"

      - name: Test
        run: npm test || echo "no tests"

      - name: Build
        run: npm run build || echo "no build"
